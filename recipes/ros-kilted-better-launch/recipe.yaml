# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-kilted-better-launch
  version: 1.3.0
source:
  git: https://github.com/dfki-ric/better_launch.git
  tag: 1.3.0
  target_directory: ros-kilted-better-launch/src/work

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 16
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://dfki-ric.github.io/better_launch/
  repository: https://github.com/dfki-ric/better_launch
  license: MIT
  summary: 'A better replacement for the ROS2 launch system: intuitive, simple, memorable.'
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - click
    - docstring_parser
    - numpy
    - osrf_pycommon
    - pip
    - prompt-toolkit
    - psutil
    - python
    - pyyaml
    - ros-kilted-ament-cmake-pytest
    - ros-kilted-ament-cmake-python
    - ros-kilted-ament-index-python
    - ros-kilted-composition-interfaces
    - ros-kilted-lifecycle-msgs
    - ros-kilted-rcl-interfaces
    - ros-kilted-rclpy
    - ros-kilted-ros-environment
    - ros-kilted-ros-workspace
    - ros2-distro-mutex 0.13.* kilted_*
    - setproctitle
  run:
    - click
    - docstring_parser
    - osrf_pycommon
    - prompt-toolkit
    - psutil
    - python
    - pyyaml
    - ros-kilted-ament-index-python
    - ros-kilted-composition-interfaces
    - ros-kilted-lifecycle-msgs
    - ros-kilted-rcl-interfaces
    - ros-kilted-rclpy
    - ros-kilted-ros-workspace
    - ros2-distro-mutex 0.13.* kilted_*
    - setproctitle
